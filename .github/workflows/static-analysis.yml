name: "Static Analysis (SwiftLint + Semgrep)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 4 * * 1"

jobs:
  static-analysis:
    name: Run SwiftLint & Semgrep and Upload SARIF
    runs-on: macos-14

    permissions:
      contents: read
      security-events: write
      actions: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Cache Homebrew (massive speedup for SwiftLint + Semgrep)
      # ---------------------------------------------------------
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            /opt/homebrew
            ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/**') }}
          restore-keys: brew-${{ runner.os }}-

      # ---------------------------------------------------------
      # Install SwiftLint
      # ---------------------------------------------------------
      - name: Install SwiftLint
        run: brew install swiftlint

      # ---------------------------------------------------------
      # Run SwiftLint (SARIF)
      # ---------------------------------------------------------
      - name: Run SwiftLint (SARIF)
        run: |
          mkdir -p sarif
          swiftlint lint --reporter sarif > sarif/swiftlint.sarif || true

      # ---------------------------------------------------------
      # Install Semgrep
      # ---------------------------------------------------------
      - name: Install Semgrep
        run: brew install semgrep

      # ---------------------------------------------------------
      # Run Semgrep (SARIF)
      # ---------------------------------------------------------
      - name: Run Semgrep (SARIF)
        run: |
          mkdir -p sarif
          semgrep scan \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/swift \
            --sarif \
            --output sarif/semgrep.sarif \
            || true

      # ---------------------------------------------------------
      # Upload SARIF to GitHub Code Scanning
      # ---------------------------------------------------------
      - name: Upload SwiftLint SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif/swiftlint.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif/semgrep.sarif
