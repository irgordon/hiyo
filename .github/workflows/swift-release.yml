name: "Hiyo Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish Hiyo Release
    runs-on: macos-14

    permissions:
      contents: write
      actions: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PRODUCT_NAME: Hiyo

    steps:
      # ---------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Xcode pinning (Hiyo requires 16.2)
      # ---------------------------------------------------------
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Verify Xcode version
        run: xcodebuild -version

      # ---------------------------------------------------------
      # Build universal macOS binary (arm64 + x86_64)
      # ---------------------------------------------------------
      - name: Build Hiyo (universal)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          mkdir -p artifacts
          cp .build/apple/Products/Release/${PRODUCT_NAME} artifacts/${PRODUCT_NAME}

      # ---------------------------------------------------------
      # Create ZIP archive
      # ---------------------------------------------------------
      - name: Create release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP_NAME="${PRODUCT_NAME}-${TAG}.zip"
          cd artifacts
          zip -r "../${ZIP_NAME}" .

      # ---------------------------------------------------------
      # Publish GitHub Release
      # ---------------------------------------------------------
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ env.PRODUCT_NAME }}-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
